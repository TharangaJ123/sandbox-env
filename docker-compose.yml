version: '3.8'

services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-service:3001
    depends_on:
      - user-service
