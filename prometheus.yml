global:
  scrape_interval: 15s      # How frequently to scrape targets by default
  evaluation_interval: 15s  # How frequently to evaluate rules

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'user-service'
    metrics_path: '/metrics'
    static_configs:
      # If running in Docker Compose, it will resolve 'user-service'. 
      # If running locally, change this to 'localhost:3001'
      - targets: ['user-service:3001']

  - job_name: 'order-service'
    metrics_path: '/metrics'
    static_configs:
      # If running in Docker Compose, it will resolve 'order-service'.
      # If running locally, change this to 'localhost:3002'
      - targets: ['order-service:3002']
